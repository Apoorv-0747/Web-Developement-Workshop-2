<!DOCTYPE html>
<html>
<body>

<h2>Marks Calculator</h2>

Enter number of subjects:
<input type="number" id="n"><br><br>

<button onclick="getMarks()">Enter Marks</button>

<p id="result"></p>

<script>
function getMarks() {
    let n = document.getElementById("n").value;
    let total = 0;

    for (let i = 1; i <= n; i++) {
        let marks = Number(prompt("Enter marks for subject " + i));
        total = total + marks;
    }

    let avg = total / n;

    let grade;
    if (avg >= 80) grade = "A";
    else if (avg >= 60) grade = "B";
    else if (avg >= 40) grade = "C";
    else grade = "F";

    let result = (avg >= 40) ? "Pass" : "Fail";

    document.getElementById("result").innerHTML =
        "Total = " + total + "<br>" +
        "Average = " + avg + "<br>" +
        "Grade = " + grade + "<br>" +
        "Result = " + result;
}
</script>

</body>
</html>










<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            margin: 5px;
            padding: 8px;
            width: 90%;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Marks & Grade Calculator</h2>

    <input type="number" id="subjects" placeholder="Enter number of subjects">
    <button onclick="createInputs()">Enter Marks</button>

    <div id="marksInputs"></div>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function createInputs() {
    let n = document.getElementById("subjects").value;
    let container = document.getElementById("marksInputs");
    container.innerHTML = "";

    for (let i = 0; i < n; i++) {
        container.innerHTML += `<input type="number" placeholder="Marks of Subject ${i+1}" class="marks"><br>`;
    }
}

function calculate() {
    let marks = document.querySelectorAll(".marks");
    let total = 0;

    for (let i = 0; i < marks.length; i++) {
        total += Number(marks[i].value);
    }

    let avg = total / marks.length;

    let grade = "";
    let resultStatus = "";

    if (avg >= 90) grade = "A+";
    else if (avg >= 75) grade = "A";
    else if (avg >= 60) grade = "B";
    else if (avg >= 50) grade = "C";
    else grade = "F";

    resultStatus = (avg >= 40) ? "Pass" : "Fail";

    document.getElementById("result").innerHTML =
        `Total: ${total} <br>
         Average: ${avg.toFixed(2)} <br>
         Grade: ${grade} <br>
         Result: ${resultStatus}`;
}
</script>

</body>
</html>
